name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Remove large files from uploads before pushing to HF
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Installe git-filter-repo
          pip install git-filter-repo
          # Supprime le dossier uploads de tout l'historique
          git filter-repo --invert-paths --path uploads/ --path dashboard_app/uploads/ --force

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://api:$HF_TOKEN@huggingface.co/spaces/Xemnas09/Datavera"
          git push hf main --force

      - name: Set HuggingFace Space secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install huggingface_hub
          python - <<EOF2
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.add_space_secret("Xemnas09/Datavera", "GEMINI_API_KEY", os.environ["GEMINI_API_KEY"])
          print("Secret GEMINI_API_KEY ajouté avec succès !")
          EOF2
